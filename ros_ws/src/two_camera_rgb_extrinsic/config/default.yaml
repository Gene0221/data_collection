camera_a:
  image_topic: /camera_a/color/image_raw
  frame_id: camera_a_color_optical_frame

camera_b:
  image_topic: /camera_b/color/image_raw
  frame_id: camera_b_color_optical_frame

synchronization:
  queue_size: 5
  slop_seconds: 0.03
  subscriber_queue_size: 1
  subscriber_buffer_bytes: 16777216

capture:
  session_name: sample_session
  output_root: /tmp/two_camera_rgb_extrinsic
  preview_width: 1280
  preview_fps: 10
  image_extension: .png
  png_compression: 3
  jpeg_quality: 95

checkerboard:
  rows: 6
  cols: 9
  square_size_mm: 25.0
