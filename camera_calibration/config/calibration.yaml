project:
  raw_root: ./data/raw
  output_root: ./data/output

board:
  type: chessboard
  pattern_size: [9, 6]
  square_size_mm: 25.0

corner_detection:
  use_find_chessboard_sb: true
  adaptive_thresh: true
  normalize_image: true
  fast_check: false
  subpix:
    enabled: true
    win_size: [11, 11]
    zero_zone: [-1, -1]
    criteria:
      max_iter: 30
      epsilon: 0.001

calibration:
  min_images: 10
  save_visualizations: true
  visualization_dirname: corners_vis
  undistort_alpha: 0.0

undistort:
  crop_to_roi: true
  save_side_by_side: true
  output_dirname: undistorted
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".tif", ".tiff"]

cameras:
  cam0:
    enabled: true
    description: left_camera
    image_dir: ./data/raw/cam0
    output_dir: ./data/output/cam0
    image_pattern: "*.jpg"

  cam1:
    enabled: true
    description: center_camera
    image_dir: ./data/raw/cam1
    output_dir: ./data/output/cam1
    image_pattern: "*.jpg"

  cam2:
    enabled: true
    description: right_camera
    image_dir: ./data/raw/cam2
    output_dir: ./data/output/cam2
    image_pattern: "*.jpg"
